spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

  packages-to-scan: com.gamerstore.user_service
  paths-to-match: /**

brevo:
  api:
    url: https://api.brevo.com/v3/smtp/email
    key: ${BREVO_API_KEY}
  email:
    from: service.gamerstore@gmail.com
    name: GamerStore

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY}