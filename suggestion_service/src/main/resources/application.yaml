spring:
  application:
    name: suggestion_service

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 60000

server:
  port: ${PORT:8080}

product:
  service:
    url: ${PRODUCT_SERVICE_URL}

logging:
  level:
    org.springframework.data.redis: INFO
    com.gamerstore.suggestion_service: DEBUG